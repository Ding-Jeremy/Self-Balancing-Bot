<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arachnova Controller</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000" />

  </head>
  <body>
    <div id="control-page"class="page">
    <h1>Self-Balancing_Bot</h1>
    
    <!-- Logo Image -->
    <img
      src="/heig_vd_logo.png"
      id="heig_icon"
      alt="HEIG-VD Logo"
      class="logo"
    />

    <!-- Joystick Container -->
    <div class="main-content">
      <div class="joystick-wrapper">
        <div class="joystick" id="joystick1"></div>
        <div class="joystick-instructions">
          <span>&uarr; Forward</span><br />
          <span>&darr; Backward</span>
        </div>
      </div>
      <!-- Angle indicator-->
      <div id="angle-indicator">
      <span id="angle-text">--- °</span>
      <span id="calibration-angle-text">---°</span>
      </div>
  
      <div class="joystick-wrapper">
        <div class="joystick" id="joystick2"></div>
        <div class="joystick-instructions">
          <span>&larr; Left</span> / <span>Right &rarr;</span>
        </div>
      </div>
    </div>
    

    <!-- Battery Indicator -->
    <div id="battery-indicator">
      <div id="battery-icon">
        <svg
          id="battery-svg"
          viewBox="0 0 60 30"
          preserveAspectRatio="xMidYMid meet"
          style="width: 10vw; height: auto;"
        >
          <!-- Battery body -->
          <rect x="1" y="5" width="50" height="20" rx="4" ry="4" fill="#222" stroke="#c4c4c4" stroke-width="2"/>
          
          <!-- Battery level -->
          <rect id="battery-level" x="3" y="7" width="0" height="16" rx="2" ry="2" fill="limegreen"/>
    
          <!-- Positive terminal -->
          <rect x="53" y="11" width="6" height="8" rx="1" ry="1" fill="#c4c4c4"/>
        </svg>
      </div>
      <div id="battery-text">
        <span id="battery-percentage">--- %</span>
        <span id="battery-voltage">-.- V</span>
      </div>
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <button id = "button_motors_toggle" class="button" onclick="send_button('motors_toggle')">Enable Motors</button>
      <button id = "button_calibrate" class="button" onclick="calibrate()">Calibrate</button>
      <button class = "button"onclick="showPIDPage()">
      PID Settings
    </button>
    </div>
    </div>
    <div id="pid-page"class="page" style="display:none;">
  
      <!-- PID PAGE-->
    <h1>PID Configuration</h1>
    <div class="pid-grid">
    <div class="pid-group">
      <h2 class="pid-title">Balance</h2>
      
      <div class="slider-container">
          <label>Kp_t:
              <span id="balancePValue">0.0</span>
          </label>
          <input type="range" id="balanceP"
                min="0" max="1000" step="0.1" value="0">
      </div>

      <div class="slider-container">
          <label>Ti_t:
              <span id="balanceIValue">0.0</span>
          </label>
          <input type="range" id="balanceI"
                min="0" max="10" step="0.01" value="0">
      </div>

      <div class="slider-container">
          <label>Td_t:
              <span id="balanceDValue">0.0</span>
          </label>
          <input type="range" id="balanceD"
                min="0" max="10" step="0.1" value="0">
      </div>
    </div>
    <div class="pid-group">
      <h2 class="pid-title">Velocity</h2>
      <div class="slider-container">
          <label>Kp_v:
              <span id="velocityPValue">0.0</span>
          </label>
          <input type="range" id="velocityP"
                min="0" max="10" step="0.1" value="0">
      </div>

      <div class="slider-container">
          <label>Ti_v:
              <span id="velocityIValue">0.0</span>
          </label>
          <input type="range" id="velocityI"
                min="0" max="10" step="0.01" value="0">
      </div>

      <div class="slider-container">
          <label>Td_v:
              <span id="velocityDValue">0.0</span>
          </label>
          <input type="range" id="velocityD"
                min="0" max="10" step="0.1" value="0">
      </div>
    </div>
    </div>
    <div class="buttons">
        <button class="button"onclick="savePID()">Save PID</button>
        <button class="button" onclick="showControlPage()">
          Back
        </button>
    </div>
    </div>
    <script src="/nipplejs.min.js"></script>
    <script src="/script.js"></script>
  </body>
</html>
